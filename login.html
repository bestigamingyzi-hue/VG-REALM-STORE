<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VG Realm - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0d0d0d;
      font-family: 'Press Start 2P', cursive;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(20, 0, 0, 0.9);
      padding: 40px;
      border: 2px solid #ff6600;
      box-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300;
      border-radius: 15px;
      text-align: center;
      width: 400px;
      position: relative;
    }
    h1 {
      color: #ff9900;
      text-shadow: 0 0 5px #ff3300, 0 0 10px #ff6600;
      margin-bottom: 30px;
    }
    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ff6600;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    input:focus {
      border-color: #ff9900;
      box-shadow: 0 0 10px #ff9900;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff6600, #ff3300);
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }
    button:hover {
      background: linear-gradient(45deg, #ff3300, #ff9900);
      box-shadow: 0 0 20px #ff9900, 0 0 40px #ff3300;
    }
    a {
      color: #ff9900;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      color: #ff3300;
      text-shadow: 0 0 10px #ff6600;
    }
    .vg-coin {
      position: absolute;
      top: -20px;
      right: -20px;
      background: gold;
      color: #000;
      border-radius: 50%;
      padding: 10px;
      font-weight: bold;
      box-shadow: 0 0 10px #ffcc00, 0 0 20px #ff9900;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="vg-coin">𝓥𝓖</div>
    <h1>Login</h1>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required><br>
      <input type="password" id="password" placeholder="Password" required><br>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register here</a></p>
  </div>
  <script type="module" src="js/login.js"></script>
</body>
</html>
