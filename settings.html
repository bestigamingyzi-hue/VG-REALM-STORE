<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VG Realm Store | Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="shortcut icon" href="assets/images/favicon.png">
</head>
<body data-page="settings">
  <div class="page-shell">
    <div class="energy-bg">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
      <div class="grid-lines"></div>
      <div class="light-streak streak-1"></div>
      <div class="light-streak streak-2"></div>
      <div class="particles" id="particles"></div>
    </div>

    <header class="navbar">
      <a class="logo" href="index.html">VG Realm</a>
      <nav class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="store.html">Store</a>
        <a href="buy-coins.html">Buy Coins</a>
        <a href="purchases.html">Purchases</a>
        <a href="payments.html">Payments</a>
        <a href="settings.html" class="active">Settings</a>
      </nav>
      <div class="nav-meta">
        <div class="coin-pill">2,850 VG Coins</div>
        <button class="nav-action" data-nav="settings.html">Profile</button>
        <button class="nav-action outline" data-nav="index.html">Logout</button>
      </div>
    </header>

    <main class="main-content">
      <section class="page-hero compact">
        <p class="eyebrow">Profile Core</p>
        <h1>Settings</h1>
        <p>Fine-tune your account identity with a control panel built like a game HUD.</p>
      </section>

      <section class="card settings-card">
        <form class="settings-form">
          <label>
            <span>Username</span>
            <input type="text" value="RealmChampion">
          </label>
          <label>
            <span>Email</span>
            <input type="email" value="champion@vgrealm.gg">
          </label>
          <label>
            <span>Password</span>
            <input type="password" value="realmpassword">
          </label>
          <button type="submit">Save Changes</button>
        </form>
      </section>
    </main>
  </div>
  <script src="api-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
